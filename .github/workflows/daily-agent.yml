name: Website Agent — Daily Run

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Restore WhatsApp session
        run: |
          mkdir -p sessions/whatsapp
          if [ -n "${{ secrets.WHATSAPP_SESSION }}" ]; then
            echo "${{ secrets.WHATSAPP_SESSION }}" | base64 -d | tar -xz -C sessions/whatsapp
            echo "✅ Session restored"
          fi
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          AGENCY_NAME: ${{ secrets.AGENCY_NAME }}
          AGENCY_PHONE: ${{ secrets.AGENCY_PHONE }}
          AGENCY_WEBSITE: ${{ secrets.AGENCY_WEBSITE }}
          DAILY_LIMIT: ${{ secrets.DAILY_LIMIT }}
          MESSAGE_DELAY_SECONDS: ${{ secrets.MESSAGE_DELAY_SECONDS }}
          UPSELL_DELAY_HOURS: ${{ secrets.UPSELL_DELAY_HOURS }}
          LEADS_CSV_PATH: ./data/leads.csv
          TRACKER_JSON_PATH: ./data/tracker.json
        run: node src/index.js --now
      - name: Save session
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "sessions/whatsapp" ] && [ "$(ls -A sessions/whatsapp)" ]; then
            SESSION_B64=$(tar -cz -C sessions/whatsapp . | base64 -w 0)
            gh secret set WHATSAPP_SESSION --body "$SESSION_B64" --repo ${{ github.repository }}
          fi
      - name: Save tracker
        if: always()
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@noreply.github.com"
          git add data/tracker.json || true
          git diff --staged --quiet || git commit -m "chore: update tracker [skip ci]"
          git push || true
