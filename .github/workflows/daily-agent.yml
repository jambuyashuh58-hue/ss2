name: Website Agent — Daily Run
 
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
 
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
 
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Install dependencies
        run: npm install
 
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          AGENCY_NAME: ${{ secrets.AGENCY_NAME }}
          AGENCY_PHONE: ${{ secrets.AGENCY_PHONE }}
          AGENCY_WEBSITE: ${{ secrets.AGENCY_WEBSITE }}
          DAILY_LIMIT: ${{ secrets.DAILY_LIMIT }}
          MESSAGE_DELAY_SECONDS: ${{ secrets.MESSAGE_DELAY_SECONDS }}
          UPSELL_DELAY_HOURS: ${{ secrets.UPSELL_DELAY_HOURS }}
          LEADS_CSV_PATH: ./data/leads.csv
          TRACKER_JSON_PATH: ./data/tracker.json
        run: node src/index.js --now
 
      - name: Save progress
        if: always()
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@noreply.github.com"
          git add -f sessions/whatsapp/ data/tracker.json || true
          git diff --staged --quiet || git commit -m "chore: update session + tracker [skip ci]"
          git push || true
 
