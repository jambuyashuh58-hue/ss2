name: WhatsApp QR Setup (run once)

on:
  workflow_dispatch:

jobs:
  setup-whatsapp:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js (NO setup-node)
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm
          node -v
          npm -v

      - name: Install dependencies
        run: npm install

      - name: Show QR code
        run: |
          echo "📱 Scan QR → WhatsApp → Linked Devices"
          timeout 90 node src/whatsapp.js --init || true

      - name: Save session to GitHub Secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token

          if [ -d "sessions/whatsapp" ] && [ "$(ls -A sessions/whatsapp)" ]; then
            SESSION_B64=$(tar -cz -C sessions/whatsapp . | base64 -w 0)
            gh secret set WHATSAPP_SESSION --body "$SESSION_B64" --repo "${{ github.repository }}"
            echo "✅ Session saved"
          else
            echo "❌ No session found"
          fi
