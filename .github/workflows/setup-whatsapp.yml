name: WhatsApp QR Setup (run once)

on:
  workflow_dispatch:

jobs:
  generate-qr:
    name: Generate QR Code Image
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Generate QR as image file
        run: node generate-qr.js

      - name: Upload QR image artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SCAN-THIS-QR-CODE
          path: qr-code.html
          retention-days: 1
