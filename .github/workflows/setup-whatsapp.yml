name: WhatsApp QR Setup (run once)
 
on:
  workflow_dispatch:
 
jobs:
  pair-whatsapp:
    name: Pair WhatsApp with phone number code
    runs-on: ubuntu-latest
    timeout-minutes: 5
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Install dependencies
        run: npm install
 
      - name: Get pairing code and wait for entry
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: node generate-qr.js
 
      - name: Save session to GitHub Secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "sessions/whatsapp" ] && [ "$(ls -A sessions/whatsapp)" ]; then
            SESSION_B64=$(tar -cz -C sessions/whatsapp . | base64 -w 0)
            gh secret set WHATSAPP_SESSION --body "$SESSION_B64" --repo ${{ github.repository }}
            echo "SUCCESS: WhatsApp session saved!"
          else
            echo "FAILED: Code was not entered in time. Re-run the workflow."
          fi
 
