name: WhatsApp QR Setup (run once)
 
on:
  workflow_dispatch:
 
jobs:
  setup-whatsapp:
    runs-on: ubuntu-latest
    timeout-minutes: 5
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Install dependencies
        run: npm install
 
      - name: Generate QR image
        run: |
          timeout 30 node src/whatsapp.js --init || true
          if [ -f "qr.txt" ]; then
            node --input-type=module << 'EOF'
          import QRCode from 'qrcode';
          import { readFileSync } from 'fs';
          const qr = readFileSync('./qr.txt', 'utf-8').trim();
          await QRCode.toFile('./qr.png', qr, { width: 400, margin: 2 });
          console.log('✅ QR image saved as qr.png');
          EOF
          else
            echo "❌ qr.txt not generated"
          fi
 
      - name: Upload QR code as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatsapp-qr-code
          path: qr.png
          retention-days: 1
 
      - name: Wait for scan then reconnect
        run: |
          echo "============================================"
          echo "  DOWNLOAD the artifact 'whatsapp-qr-code' "
          echo "  Open qr.png on your computer             "
          echo "  WhatsApp phone -> Linked Devices -> Scan "
          echo "============================================"
          sleep 90
 
      - name: Reconnect and save session
        run: timeout 30 node src/whatsapp.js --init || true
 
      - name: Save session to GitHub Secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "sessions/whatsapp" ] && [ "$(ls -A sessions/whatsapp)" ]; then
            SESSION_B64=$(tar -cz -C sessions/whatsapp . | base64 -w 0)
            gh secret set WHATSAPP_SESSION --body "$SESSION_B64" --repo ${{ github.repository }}
            echo "✅ Session saved! WhatsApp connected."
          else
            echo "❌ Not scanned in time — re-run and scan faster"
          fi
