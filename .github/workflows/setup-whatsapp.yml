name: WhatsApp QR Setup (run once)
 
on:
  workflow_dispatch:
 
jobs:
  pair-whatsapp:
    name: Pair WhatsApp with phone number code
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Install dependencies
        run: npm install
 
      - name: Get pairing code and wait for entry
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: node generate-qr.js
 
      - name: Commit session to repo
        if: always()
        run: |
          if [ -d "sessions/whatsapp" ] && [ "$(ls -A sessions/whatsapp)" ]; then
            git config user.name "Agent Bot"
            git config user.email "agent@noreply.github.com"
            git add -f sessions/whatsapp/
            git diff --staged --quiet || git commit -m "chore: save whatsapp session [skip ci]"
            git push
            echo "SUCCESS: Session committed to repo!"
          else
            echo "FAILED: Code was not entered in time. Re-run the workflow."
          fi
 
